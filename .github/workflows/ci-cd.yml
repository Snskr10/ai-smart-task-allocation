name: CI / CD Pipeline

# ──────────────────────────────────────────────────────────────────────────────
#  Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────────────────────────────────────
#  Environment variables shared across jobs
# ──────────────────────────────────────────────────────────────────────────────
env:
  REGISTRY: docker.io
  BACKEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/silentflow-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/silentflow-frontend
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

jobs:

  # ── 1. Backend: lint + unit tests ──────────────────────────────────────────
  test-backend:
    name: Backend Tests (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-cov

      - name: Run unit tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            || echo "No tests found — skipping"

      - name: Smoke-test Flask app starts
        working-directory: backend
        run: |
          python -c "from app import create_app; app = create_app(); print('Flask OK')"

      - name: Verify ML model imports
        working-directory: backend
        run: |
          python -c "from services.ml_model import status; print('ML module OK:', status())"

  # ── 2. Frontend: type-check + build ────────────────────────────────────────
  test-frontend:
    name: Frontend Build (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── 3. Docker build + push (main branch only) ───────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (multi-platform builds)
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Backend image ────────────────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      # ── Frontend image ───────────────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

  # ── 4. Kubernetes deploy (main branch, after Docker push) ───────────────────
  k8s-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production          # Requires manual approval in GitHub Settings

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update image tags to new SHA
        run: |
          kubectl set image deployment/silentflow-backend \
            backend=${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }} \
            -n silentflow
          kubectl set image deployment/silentflow-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }} \
            -n silentflow

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/silentflow-backend  -n silentflow --timeout=120s
          kubectl rollout status deployment/silentflow-frontend -n silentflow --timeout=120s

      - name: Verify HPA
        run: kubectl get hpa -n silentflow
