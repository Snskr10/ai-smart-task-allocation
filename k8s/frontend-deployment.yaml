apiVersion: apps/v1
kind: Deployment
metadata:
  name: silentflow-frontend
  namespace: silentflow
  labels:
    app: silentflow
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: silentflow
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: silentflow
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx user
      containers:
        - name: frontend
          image: silentflow-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
