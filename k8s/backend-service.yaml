apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: silentflow
  labels:
    app: silentflow
    component: backend
spec:
  selector:
    app: silentflow
    component: backend
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP          # Internal only; exposed via Ingress
